name: Actualizar EPG DSports

# Cuándo se ejecutará este script
on:
  schedule:
    - cron: '0 6 * * *' # Se ejecuta todos los días a las 6:00 AM UTC (Madrugada en Latinoamérica)
  workflow_dispatch: # Nos permite ejecutarlo manualmente con un botón para probar

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 4. Ejecutar el script generador de EPG
      run: python dsports_epg.py

    - name: 5. Subir la nueva guía al repositorio
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add dsports_guia.xml
        # Solo guarda si el archivo realmente detectó programas nuevos
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de EPG"
        git push
